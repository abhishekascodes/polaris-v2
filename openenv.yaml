spec_version: 1
name: polaris_v3
type: space
runtime: fastapi
entrypoint: server.app:app
app: server.app:app
port: 7860

tasks:
  - id: environmental_recovery
    description: "Environmental Recovery (Easy): Reduce pollution from 170 to below 80 while maintaining GDP above 60. Events disabled."
    max_steps: 50
    difficulty: easy

  - id: balanced_economy
    description: "Balanced Economy (Medium): Simultaneously maintain GDP > 80, pollution < 100, and satisfaction > 60 over 100 steps."
    max_steps: 100
    difficulty: medium

  - id: sustainable_governance
    description: "Sustainable Governance (Hard): Maintain long-horizon stability under calibrated event pressure with floor damping and crisis bonus."
    max_steps: 200
    difficulty: hard

  - id: sustainable_governance_extreme
    description: "Sustainable Governance — EXTREME: Unstable regime where all strategies collapse. Structural instability benchmark."
    max_steps: 200
    difficulty: extreme

  - id: multi_agent_council
    description: "Multi-Agent Council (Extreme+): 5 AI ministers negotiate through natural language. Agent must form coalitions, predict vetoes, and act on diplomatic briefings."
    max_steps: 300
    difficulty: extreme

  - id: negotiation_arena
    description: "Negotiation Arena: Full multi-agent negotiation with theory-of-mind scoring. Agent reads minister proposals, forms coalitions, predicts vetoes, responds to intelligence briefings."
    max_steps: 200
    difficulty: hard

action_space:
  type: structured
  count: 19
  schema: models.PolicyAction

observation_schema: models.PolicyObservationSchema
